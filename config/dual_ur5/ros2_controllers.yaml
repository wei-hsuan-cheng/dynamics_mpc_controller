policy_visualization:
  ros__parameters:
    urdfFile: "$(var urdfFile)"
    removeJoints: [""]
    endEffectorFrame: "ur_arm1_tool0"
    mpcPolicyTopic: "$(var mpcPolicyTopic)"
    frameId: "world"

    optimized_state_trajectory:
      activate: true
      markerTopic: "/policy_visualization/optimizedStateTrajectory"
      lineWidth: 0.01
      pointScale: 0.025

    self_collision:
      activate: true
      markerTopic: "/policy_visualization/selfCollisionDistanceMarkers"
